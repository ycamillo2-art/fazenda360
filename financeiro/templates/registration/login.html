{% extends 'base.html' %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow-lg p-4" style="max-width: 400px; width: 100%; border-radius: 15px; border: none;">
        <div class="text-center mb-4">
            <h2 style="color: #5d4037; font-weight: 800;">FAZENDA<span style="color: #2e7d32;">360</span></h2>
            <p class="text-muted">Acesso ao Sistema Financeiro</p>
        </div>
        
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="username" class="form-label">Usuário</label>
                <input type="text" name="username" class="form-control" id="username" required 
                       style="border-radius: 10px; padding: 12px; border: 1px solid #ddd;">
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Senha</label>
                <input type="password" name="password" class="form-control" id="password" required
                       style="border-radius: 10px; padding: 12px; border: 1px solid #ddd;">
            </div>
            
            {% if form.errors %}
                <div class="alert alert-danger" style="border-radius: 10px; font-size: 0.9rem;">
                    Usuário ou senha incorretos.
                </div>
            {% endif %}
            
            <button type="submit" class="btn w-100 py-3 mt-2" 
                    style="background: #2e7d32; color: white; border-radius: 10px; font-weight: bold; border: none; transition: 0.3s;">
                Entrar no Sistema
            </button>
        </form>
    </div>
</div>

<style>
    body { background-color: #f8f9fa !important; }
    .navbar { display: none !important; } /* Esconde o menu na tela de login */
    button:hover { background: #1b5e20 !important; transform: translateY(-2px); }
</style>
{% endblock %}
